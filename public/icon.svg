<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#6b21a8"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="24" x2="40" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
  </defs>
  <!-- Dark purple rounded square background -->
  <rect width="48" height="48" rx="11" fill="url(#bg)"/>
  <!-- FSL mark in light purple/pink -->
  <g stroke="url(#mark)" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- F -->
    <line x1="7"  y1="10" x2="7"  y2="38"/>
    <line x1="7"  y1="10" x2="18" y2="10"/>
    <line x1="7"  y1="23" x2="16" y2="23"/>
    <!-- S -->
    <path d="M 30,15 C 30,10 20,10 20,16 C 20,22 30,22 30,28 C 30,36 20,36 20,31"/>
    <!-- L -->
    <line x1="33" y1="10" x2="33" y2="38"/>
    <line x1="33" y1="38" x2="44" y2="38"/>
    <!-- Arrow -->
    <line x1="41" y1="14" x2="41" y2="26"/>
    <polyline points="37,20 41,13 45,20"/>
  </g>
</svg>
